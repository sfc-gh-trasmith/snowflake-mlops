name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: PROD
    env:
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE_PROD }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
      TOPOLOGY: ${{ vars.TOPOLOGY || 'single-account' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Snowflake CLI
        uses: snowflakedb/snowflake-actions@v3
        with:
          use-oidc: true

      - name: Test Snowflake Connection
        run: snow connection test -x

      - name: Verify model exists in PROD
        run: |
          snow sql -q "SHOW MODELS LIKE 'MLOPS_FRAUD_DETECTOR' IN SNOW_MLOPS_PROD.ML" -x

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group snow --no-default-groups

      - name: Deploy with blue/green gateway swap
        run: uv run python scripts/deploy_prod_service.py
        timeout-minutes: 20

      - name: Verify gateway endpoint
        run: |
          snow sql -q "DESC GATEWAY SNOW_MLOPS_PROD.ML.FRAUD_DETECTOR_GATEWAY" -x
