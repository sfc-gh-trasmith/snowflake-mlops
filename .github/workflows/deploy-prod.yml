name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  SNOWFLAKE_ACCOUNT: SFSENORTHAMERICA-TBSMITH-AWS1

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: PROD
    env:
      SNOWFLAKE_DATABASE: SNOW_MLOPS_PROD
      SNOWFLAKE_SCHEMA: ML
    steps:
      - uses: actions/checkout@v4

      - name: Set up Snowflake CLI
        uses: snowflakedb/snowflake-actions@v3
        with:
          use-oidc: true

      - name: Test Snowflake Connection
        run: snow connection test -x

      # Future: PROD deployment steps
      # - Deploy validated model from STAGE
      # - Promote model version
      # - Update inference service
