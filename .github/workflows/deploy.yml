name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'

permissions:
  id-token: write
  contents: read

env:
  SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    environment: STAGE
    env:
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE_STAGE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Snowflake CLI
        uses: snowflakedb/snowflake-actions@v3
        with:
          use-oidc: true

      - name: Test Snowflake Connection
        run: snow connection test -x

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Setup Feature Store in STAGE (if not exists)
        run: |
          snow sql -q "
            USE WAREHOUSE SNOW_MLOPS_STAGE_WH;
            -- Feature views will be created by the pipeline on first run
            -- For now just ensure the schema objects exist
          " -x

      - name: Run STAGE ML Pipeline (train + register + replicate)
        run: uv run python scripts/run_stage_pipeline.py
        timeout-minutes: 20
